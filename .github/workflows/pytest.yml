name: Pytest

on:
  push:
    branches: [master, main]
    paths:
      - "api/**"
      - "agent/**"
      - "memory/**"
      - "db/**"
      - "tests/**"
      - "settings.py"
      - "requirements.txt"
      - "pyproject.toml"
      - ".github/workflows/pytest.yml"
  pull_request:
    paths:
      - "api/**"
      - "agent/**"
      - "memory/**"
      - "db/**"
      - "tests/**"
      - "settings.py"
      - "requirements.txt"
      - "pyproject.toml"
      - ".github/workflows/pytest.yml"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run pytest
        run: pytest
