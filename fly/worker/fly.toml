# Fly.io config for the arq worker app (NO public service - always-on).
# Deploy from the repo root:
#   fly deploy --config fly/worker/fly.toml --dockerfile Dockerfile
#
# Same secrets as the API (it shares Redis + the DB):
#   fly secrets set LLM_PROVIDER=nvidia \
#       NVIDIA_API_KEY=... NVIDIA_MODEL=meta/llama-3.3-70b-instruct \
#       TAVILY_API_KEY=... \
#       REDIS_URL=redis://research-redis.internal:6379 \
#       DATABASE_URL=postgresql+asyncpg://USER:PASS@HOST/db?ssl=require \
#       --config fly/worker/fly.toml

app = "research-worker"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

# Override the image CMD to run the arq worker instead of uvicorn.
# No [http_service] block => the app exposes no public ports.
[processes]
  worker = "arq api.worker.WorkerSettings"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
  processes = ["worker"]
