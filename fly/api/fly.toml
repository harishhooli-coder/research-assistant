# Fly.io config for the FastAPI API app (public HTTP service + SSE).
# Deploy from the repo root:
#   fly deploy --config fly/api/fly.toml --dockerfile Dockerfile
#
# Set secrets first (NOT committed):
#   fly secrets set LLM_PROVIDER=nvidia \
#       NVIDIA_API_KEY=... NVIDIA_MODEL=meta/llama-3.3-70b-instruct \
#       TAVILY_API_KEY=... \
#       REDIS_URL=redis://research-redis.internal:6379 \
#       DATABASE_URL=postgresql+asyncpg://USER:PASS@HOST/db?ssl=require \
#       CORS_ALLOW_ORIGINS=https://your-app.vercel.app --config fly/api/fly.toml

app = "research-api"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[http_service]
  internal_port = 8000
  force_https = true
  # Keep at least one machine up so long-lived SSE streams aren't interrupted.
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = "connections"
    soft_limit = 150
    hard_limit = 200

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
