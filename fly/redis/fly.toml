# Fly.io config for a self-hosted Redis with a persistent volume.
# Reachable privately by the api/worker apps at: research-redis.internal:6379
# (no public ports - access is over Fly's private 6PN network only).
#
# Create the volume once, then deploy:
#   fly volumes create redis_data --region iad --size 1 --config fly/redis/fly.toml
#   fly deploy --config fly/redis/fly.toml
# (Run from the fly/redis directory, or pass the dockerfile path explicitly.)

app = "research-redis"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[[mounts]]
  source = "redis_data"
  destination = "/data"

# Keep exactly one machine running; do not autostop a stateful service.
[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
